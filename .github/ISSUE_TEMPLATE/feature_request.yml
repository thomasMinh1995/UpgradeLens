name: Feature request
description: Propose a bounded product, workflow, or developer-experience improvement.
title: "[Feature]: "
labels: []
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        DepVerdict is a decision-first, evidence-bounded CLI in Public Technical Preview / Alpha. It does not autonomously migrate source.

        Do not include API keys, npm tokens, PATs, `.env` content, signed URLs, private source, unsanitized manifests or artifacts, raw provider requests/responses, or personal or organization-confidential data.

        Report vulnerabilities through [GitHub Private Vulnerability Reporting](https://github.com/thomasMinh1995/DepVerdict/security/advisories/new). For a sensitive conduct report, follow the private route in the [Code of Conduct](https://github.com/thomasMinh1995/DepVerdict/blob/main/CODE_OF_CONDUCT.md). Do not disclose either through this public form.
  - type: textarea
    id: problem
    attributes:
      label: Problem and user workflow
      description: Describe the decision or workflow problem before proposing a solution.
    validations:
      required: true
  - type: input
    id: target-user
    attributes:
      label: Target user
      placeholder: "Developer, maintainer, release engineer, or Coding Agent reviewer"
    validations:
      required: true
  - type: textarea
    id: workaround
    attributes:
      label: Current workaround
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Proposed outcome
      description: Describe the observable result, not an implementation mandate.
    validations:
      required: true
  - type: textarea
    id: ecosystem-shape
    attributes:
      label: Ecosystem and sanitized repository shape
      description: Do not include private organization, repository, package, or path names.
    validations:
      required: true
  - type: textarea
    id: trust
    attributes:
      label: Trust and human-review implications
      description: Explain effects on evidence, target ownership, commands, source changes, approval, coverage, or fail-closed behavior.
    validations:
      required: true
  - type: dropdown
    id: scope-fit
    attributes:
      label: Current contract fit
      options:
        - Decision clarity or evidence quality
        - Installed baseline or selector behavior
        - Analyzer coverage
        - Human-reviewed migration handoff
        - CI or exit semantics
        - Documentation or developer experience
        - Outside or uncertain
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed API keys, npm tokens, PATs, `.env` content, signed URLs, authorization data, private source, unsanitized manifests/artifacts, provider payloads, and personal or organization-confidential data.
          required: true
        - label: This request contains no vulnerability or sensitive conduct details; I will use the private routes above when appropriate.
          required: true
        - label: I understand autonomous source migration is outside the current DepVerdict contract.
          required: true
